<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo oscuro elegante -->
  <rect width="512" height="512" fill="#1a1a1a" rx="80" ry="80"/>

  <!-- Círculo dorado de fondo -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#d4c5a0" stroke-width="3" opacity="0.4"/>

  <!-- Espada vertical estilizada (icónica Dark Souls) -->
  <g fill="#d4c5a0">
    <!-- Hoja -->
    <polygon points="256,100 244,120 244,330 256,340 268,330 268,120"/>
    <!-- Cruz / guardia -->
    <rect x="200" y="320" width="112" height="14" rx="2"/>
    <!-- Empuñadura -->
    <rect x="246" y="334" width="20" height="60" rx="2"/>
    <!-- Pomo -->
    <circle cx="256" cy="408" r="14"/>
  </g>

  <!-- Tagline circular sutil (texto curvo simulado con arco) -->
  <text x="256" y="460" font-family="Georgia, serif" font-size="20" fill="#d4c5a0" text-anchor="middle" letter-spacing="6" font-style="italic" opacity="0.7">QUEST LOG</text>
</svg>
